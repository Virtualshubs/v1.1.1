<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Catálogo Cliente</title>

  <style>
    body {
      margin: 0;
      overflow: hidden;
    }

    #catalogFrame {
      width: 100vw;
      height: 100vh;
      border: none;
    }
  </style>
</head>
<body>

<!-- 🔥 IFRAME que carga tu catálogo REAL -->
<iframe 
  id="catalogFrame"
  src="https://catalog.3dtwins.tech/catalogindex.html">
</iframe>

<script>
  // 🔹 SOLO DATOS (esto es lo único que exportas)
  const scenesArray = [...]; // ← aquí tu JSON

  const iframe = document.getElementById('catalogFrame');

  iframe.onload = () => {
    // 🔥 Enviamos datos al catálogo
    iframe.contentWindow.postMessage({
      type: 'LOAD_SCENES',
      payload: scenesArray
    }, '*');
  };
</script>

</body>
</html>
